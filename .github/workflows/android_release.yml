name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*' # Se activa al subir una etiqueta tipo v1.0.1
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore release keystore
        if: ${{ secrets.HINDRAX_RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.HINDRAX_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/hindrax-release.jks"

      - name: Validate with Gradle tests
        run: ./gradlew testDebugUnitTest

      - name: Build signed release APK
        if: ${{ secrets.HINDRAX_RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          HINDRAX_KEYSTORE_PATH: ${{ runner.temp }}/hindrax-release.jks
          HINDRAX_KEYSTORE_PASSWORD: ${{ secrets.HINDRAX_KEYSTORE_PASSWORD }}
          HINDRAX_KEY_ALIAS: ${{ secrets.HINDRAX_KEY_ALIAS }}
          HINDRAX_KEY_PASSWORD: ${{ secrets.HINDRAX_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build fallback debug APK
        if: ${{ secrets.HINDRAX_RELEASE_KEYSTORE_BASE64 == '' }}
        run: ./gradlew assembleDebug

      - name: Prepare release asset
        run: |
          mkdir -p release-artifacts
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "release-artifacts/hindrax-${GITHUB_REF_NAME}.apk"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "release-artifacts/hindrax-${GITHUB_REF_NAME}-debug.apk"
          fi
          ls -lh release-artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*.apk
          name: Release ${{ github.ref_name }}
          body: |
            Hindrax SS automated release.

            Protocol:
            - Gradle unit tests passed.
            - APK compiled by GitHub Actions.
            - App updater detects this release through /releases/latest.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
