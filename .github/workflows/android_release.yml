name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*' # Se activa al subir una etiqueta tipo v1.0.1
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.HINDRAX_RELEASE_KEYSTORE_BASE64 }}
      HINDRAX_KEYSTORE_PASSWORD: ${{ secrets.HINDRAX_KEYSTORE_PASSWORD }}
      HINDRAX_KEY_ALIAS: ${{ secrets.HINDRAX_KEY_ALIAS }}
      HINDRAX_KEY_PASSWORD: ${{ secrets.HINDRAX_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore release keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/hindrax-release.jks"

      - name: Validate with Gradle tests
        run: ./gradlew --build-cache --parallel testDebugUnitTest

      - name: Build signed release APK
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          HINDRAX_KEYSTORE_PATH: ${{ runner.temp }}/hindrax-release.jks
        run: ./gradlew --build-cache --parallel assembleRelease

      - name: Build fallback debug APK
        if: ${{ env.RELEASE_KEYSTORE_BASE64 == '' }}
        run: ./gradlew --build-cache --parallel assembleDebug

      - name: Prepare release asset
        run: |
          mkdir -p release-artifacts
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "release-artifacts/hindrax-${GITHUB_REF_NAME}.apk"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "release-artifacts/hindrax-${GITHUB_REF_NAME}.apk"
          fi
          (cd release-artifacts && sha256sum *.apk > SHA256SUMS.txt)
          ls -lh release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="$(cat <<'EOF'
          Hindrax SS automated release.

          Protocol:
          - Gradle unit tests passed.
          - APK compiled by GitHub Actions.
          - APK asset name is stable: hindrax-${{ github.ref_name }}.apk.
          - App updater detects this release through /releases/latest.
          EOF
          )"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Release ${GITHUB_REF_NAME}" \
              --notes "$NOTES" \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "Release ${GITHUB_REF_NAME}" \
              --notes "$NOTES" \
              --latest
          fi

          gh release upload "${GITHUB_REF_NAME}" release-artifacts/* --clobber
